version: 2

project_name: vectorizer

before:
  hooks:
    - go mod tidy

builds:
  - id: vectorizer
    main: ./cmd/vectorizer
    binary: vectorizer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.date={{ .Date }}

archives:
  - id: default
    ids:
      - vectorizer
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats:
          - zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  header: |
    ## Downloads

    GitHub may collapse the raw asset list when many platform packages are attached. Use these direct links to pick the right build:

    | Platform | Download |
    | --- | --- |
    | Windows x64 | [vectorizer_{{ .Version }}_windows_amd64.zip](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_windows_amd64.zip) |
    | Windows ARM64 | [vectorizer_{{ .Version }}_windows_arm64.zip](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_windows_arm64.zip) |
    | macOS Apple Silicon | [vectorizer_{{ .Version }}_darwin_arm64.tar.gz](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_darwin_arm64.tar.gz) |
    | macOS Intel | [vectorizer_{{ .Version }}_darwin_amd64.tar.gz](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_darwin_amd64.tar.gz) |
    | Linux x64 | [tar.gz](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_linux_amd64.tar.gz) / [deb](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_linux_amd64.deb) / [rpm](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_linux_amd64.rpm) / [apk](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_linux_amd64.apk) |
    | Linux ARM64 | [tar.gz](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_linux_arm64.tar.gz) / [deb](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_linux_arm64.deb) / [rpm](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_linux_arm64.rpm) / [apk](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/vectorizer_{{ .Version }}_linux_arm64.apk) |
    | Checksums | [checksums.txt](https://github.com/clv/vectorizer-ai-cli/releases/download/{{ .Tag }}/checksums.txt) |


nfpms:
  - id: linux-packages
    package_name: vectorizer
    ids:
      - vectorizer
    vendor: Cedar Lake Ventures, Inc.
    homepage: https://vectorizer.ai
    maintainer: Vectorizer.AI <support@vectorizer.ai>
    description: Official command-line client for the Vectorizer.AI image vectorization API.
    license: Apache-2.0
    bindir: /usr/bin
    formats:
      - deb
      - rpm
      - apk
    contents:
      - src: README.md
        dst: /usr/share/doc/vectorizer/README.md
      - src: LICENSE
        dst: /usr/share/doc/vectorizer/LICENSE
